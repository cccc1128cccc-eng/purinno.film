<script>

      },
    },
  };

  /* 使用者上傳的紙張紋理照片已作為背景圖，這裡不再疊加合成雜訊 */
  .grain::before{
    content:none;
  }

  /* 卡片 / 便條紙元素上使用的細緻紙纖維紋理，顏色不變 */
  .paper-texture{
    position:relative;
    background-color:#F4EFE3;
  }
  .paper-texture::after{
    content:"";
    position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    opacity:.45; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.42  0 0 0 0 0.36  0 0 0 0 0.29  0 0 0 0.4 0'/></filter><rect width='100%25' height='100%25' filter='url(%23p)'/></svg>");
  }

  /* 便條紙撕邊 / torn-paper top edge, matches 圖1 */
  .torn-top{
    clip-path: polygon(
      0% 10%, 4% 4%, 8% 12%, 12% 3%, 16% 11%, 20% 2%, 24% 9%,
      28% 4%, 32% 12%, 36% 3%, 40% 10%, 44% 2%, 48% 9%,
      52% 4%, 56% 12%, 60% 3%, 64% 10%, 68% 2%, 72% 9%,
      76% 4%, 80% 12%, 84% 3%, 88% 10%, 92% 2%, 96% 9%, 100% 4%,
      100% 100%, 0% 100%
    );
  }

  /* 便條紙橫線 / ruled notebook lines, 貫穿整張便條紙 */
  .ruled-lines{
    background-image: repeating-linear-gradient(
      to bottom, transparent 0 42px, #DCD2C0 42px 43px
    );
    background-position: 0 26px;
  }

  /* 撕下的膠帶，邊緣也做鋸齒感 */
  .tape{
    position:absolute; top:-9px; height:24px; width:78px;
    background:rgba(255,255,255,0.6);
    box-shadow:0 1px 2px rgba(0,0,0,0.08);
    clip-path: polygon(
      0% 20%, 8% 0%, 16% 25%, 24% 5%, 32% 22%, 40% 0%, 48% 20%,
      56% 5%, 64% 25%, 72% 0%, 80% 20%, 88% 5%, 100% 22%,
      100% 100%, 0% 100%
    );
  }

  /* 底下透出的第二層紙張，營造疊紙效果，顏色不變只是稍淺 */
  .paper-peek{
    position:absolute; inset:0;
    background:#F7E9C8;
    transform: translate(6px, 8px);
    border-radius:4px;
  }

  /* 圖片外框，套用於所有出現圖片／預留方框的地方 */
  .photo-frame{
    padding:6px;
    background:#F4EFE3;
    border:3px solid #8A6F5C;
    border-radius:8px;
  }
  .photo-frame img, .photo-frame .placeholder-box{
    display:block;
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:4px;
  }

  /* 商品頁面卡（商品卡）專用照片外框，比例改為 3:4（直式） */
  .photo-frame-detail{
    padding:6px;
    background:#F4EFE3;
    border:3px solid #8A6F5C;
    border-radius:8px;
  }
  .photo-frame-detail img, .photo-frame-detail .placeholder-box{
    display:block;
    width:100%;
    aspect-ratio:3/4;
    object-fit:cover;
    border-radius:4px;
  }

  /* 商品清單頁專用外框，比例為 3:4（直式） */
  .photo-frame-list{
    padding:6px;
    background:#F4EFE3;
    border:3px solid #8A6F5C;
    border-radius:10px;
  }
  .photo-frame-list img, .photo-frame-list .placeholder-box{
    display:block;
    width:100%;
    aspect-ratio:3/4;
    object-fit:cover;
    border-radius:6px;
  }

  /* 出貨順序頁專用外框，橫式列表縮小照片比例 */
  .photo-frame-row{
    padding:4px;
    background:#F4EFE3;
    border:2px solid #8A6F5C;
    border-radius:8px;
  }
  .photo-frame-row img, .photo-frame-row .placeholder-box{
    display:block;
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:5px;
  }

  /* 自訂檔案上傳按鈕，隱藏原生 input 與「未選擇檔案」文字 */
  .hidden-file-input{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#c9bba3; border-radius:8px; }
</style>

// 商品狀態對應顏色（僅用於商品頁面卡）
function getStatusColor(status) {
  if (status === "已下單" || status === "未寄出") return "#755B48"; // statusA
  if (status === "已寄出" || status === "面交") return "#8E5835"; // statusB
  if (status === "到貨") return "#A9835E"; // statusC，暫用金色，待你確認正式色碼
  return "#755B48";
}

/* ---------- 商品狀態清單按鈕 / Status list picker（可點擊切換商品狀態）---------- */
function StatusPicker({ status, onChange, size = "md" }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  const color = getStatusColor(status);

  useEffect(() => {
    function handleOutside(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handleOutside);
    return () => document.removeEventListener("mousedown", handleOutside);
  }, []);

  const sizeCls =
    size === "sm"
      ? "px-2 py-0.5 text-[10px]"
      : "px-4 py-1.5 text-sm";

  return (
    <div
      ref={wrapRef}
      className="relative inline-block"
      onClick={(e) => e.stopPropagation()}
    >
      <button
        type="button"
        onClick={() => setOpen((o) => !o)}
        aria-haspopup="listbox"
        aria-expanded={open}
        className={`shrink-0 inline-flex items-center gap-1 rounded-full font-serifTC font-medium text-paper shadow-sm hover:brightness-95 active:scale-95 transition-all ${sizeCls}`}
        style={{ backgroundColor: color }}
      >
        {status}
        <svg viewBox="0 0 24 24" className={size === "sm" ? "w-2.5 h-2.5" : "w-3.5 h-3.5"} fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>

      {open && (
        <div
          role="listbox"
          className="absolute right-0 z-20 mt-1.5 w-32 paper-texture rounded-xl shadow-lg overflow-hidden border border-line"
        >
          <div className="relative z-[1]">
            {STATUS_OPTIONS.map((s) => (
              <button
                key={s}
                type="button"
                role="option"
                aria-selected={s === status}
                onClick={() => { onChange(s); setOpen(false); }}
                className="w-full text-left px-3 py-2 text-xs font-serifTC font-medium hover:bg-cream/80 transition-colors flex items-center gap-2"
              >
                <span
                  className="w-2.5 h-2.5 rounded-full shrink-0"
                  style={{ backgroundColor: getStatusColor(s) }}
                />
                <span className={s === status ? "text-brownDark font-bold" : "text-brownSoft"}>{s}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 出貨順序頁 / Shipping order page（依商品清單狀態排序，橫式一列列出）---------- */
function ShippingPage({ products, onSelect, onBack, onStatusChange }) {
  const groups = SHIPPING_GROUPS.map((g) => ({
    ...g,
    items: products.filter((p) => g.statuses.includes(p.status)),
  }));
  const hasAny = groups.some((g) => g.items.length > 0);

  return (
    <div className="min-h-screen px-5 sm:px-10 py-10 max-w-3xl mx-auto">
      <div className="flex items-center justify-between mb-10">
        <button
          onClick={onBack}
          className="flex items-center gap-1 text-brownSoft/70 text-xs hover:text-brownDark transition-colors"
        >
          <BackIcon className="w-3.5 h-3.5" /> 返回
        </button>
        <p className="font-serifTC font-bold text-brownDark text-lg tracking-wide">出貨順序</p>
        <span className="w-10" />
      </div>

      {!hasAny ? (
        <div className="text-center border border-dashed border-brownMid/40 rounded-2xl py-20 px-6">
          <p className="font-serifTC font-medium text-brownSoft text-sm">
            尚未有任何商品紀錄
          </p>
        </div>
      ) : (
        <div className="space-y-10">
          {groups.map((g) =>
            g.items.length === 0 ? null : (
              <div key={g.title}>
                <div className="flex items-center gap-2 mb-4">
                  <span
                    className="w-2.5 h-2.5 rounded-full shrink-0"
                    style={{ backgroundColor: getStatusColor(g.statuses[0]) }}
                  />
                  <p className="font-serifTC font-bold text-brownDark text-sm tracking-wide">
                    {g.title}
                  </p>
                  <span className="font-serifTC font-medium text-brownSoft/60 text-xs">
                    （{g.items.length}）
                  </span>
                </div>

                <div className="space-y-3">
                  {g.items.map((p) => (
                    <div
                      key={p.id}
                      role="button"
                      tabIndex={0}
                      onClick={() => onSelect(p)}
                      onKeyDown={(e) => { if (e.key === "Enter") onSelect(p); }}
                      className="flex items-center gap-4 bg-paper/60 rounded-2xl p-3 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-150 cursor-pointer"
                    >
                      <div className="photo-frame-row w-20 sm:w-24 shrink-0">
                        <img src={p.image || DEFAULT_PRODUCT_IMAGE} alt={p.name} />
                      </div>

                      <div className="flex-1 min-w-0">
                        <p className="font-serifTC font-bold text-brownDark text-sm truncate">{p.name}</p>
                        <p className="font-serifTC font-medium text-brownSoft text-xs mt-1 truncate">
                          {p.vendor || "未填寫出貨商"}
                        </p>
                      </div>

                      <div className="flex flex-col items-end gap-2 shrink-0">
                        <span className="font-serifTC font-medium text-brownSoft text-xs">
                          {p.price ? `NT$ ${Number(p.price).toLocaleString()}` : "—"}
                        </span>
                        <StatusPicker
                          status={p.status}
                          onChange={(s) => onStatusChange(p.id, s)}
                          size="sm"
                        />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- 新增商品表單 / Add product form modal ---------- */
function AddProductModal({ onClose, onSave }) {
  const [name, setName] = useState("");
  const [price, setPrice] = useState("");
  const [vendor, setVendor] = useState("");
  const [status, setStatus] = useState(STATUS_OPTIONS[0]);
  const [imagePreview, setImagePreview] = useState(null);
  const fileInputRef = useRef(null);

  function handleFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImagePreview(ev.target.result);
    reader.readAsDataURL(file);
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!name.trim()) return;
    onSave({
      id: Date.now() + Math.random(),
      name: name.trim(),
      price: price.trim(),
      vendor: vendor.trim(),
      status,
      image: imagePreview,
    });
  }

  return (
    <div className="fixed inset-0 z-[60] bg-brownDark/40 backdrop-blur-[2px] flex items-center justify-center p-4 overflow-y-auto">
      <div className="paper-texture rounded-2xl shadow-xl w-full max-w-md p-7 relative my-8">
        <button
          onClick={onClose}
          aria-label="關閉"
          className="relative z-[1] absolute top-4 right-4 text-brownSoft hover:text-brownDark"
        >
          <CloseIcon className="w-5 h-5" />
        </button>

        <div className="relative z-[1]">
          <h3 className="font-serifTC font-bold text-xl text-brownDark mb-6">新增商品</h3>

          <form onSubmit={handleSubmit} className="space-y-5">
            <div>
              <label className="block text-xs font-medium text-brownSoft mb-1">商品名稱</label>
              <input
                value={name} onChange={(e) => setName(e.target.value)} required
                className="w-full bg-transparent border-b border-line focus:border-brownDark outline-none py-2 text-brownDark placeholder:text-brownSoft/40 font-serifTC font-medium"
                placeholder="例如：陶瓷馬克杯"
              />
            </div>

            <div>
              <label className="block text-xs font-medium text-brownSoft mb-1">商品價格</label>
              <input
                value={price} onChange={(e) => setPrice(e.target.value)} type="number" min="0"
                className="w-full bg-transparent border-b border-line focus:border-brownDark outline-none py-2 text-brownDark placeholder:text-brownSoft/40 font-serifTC font-medium"
                placeholder="例如：450"
              />
            </div>

            <div>
              <label className="block text-xs font-medium text-brownSoft mb-1">出貨商</label>
              <input
                value={vendor} onChange={(e) => setVendor(e.target.value)}
                className="w-full bg-transparent border-b border-line focus:border-brownDark outline-none py-2 text-brownDark placeholder:text-brownSoft/40 font-serifTC font-medium"
                placeholder="例如：蝦皮賣家 A"
              />
            </div>

            <div>
              <label className="block text-xs font-medium text-brownSoft mb-1">商品狀態</label>
              <select
                value={status} onChange={(e) => setStatus(e.target.value)}
                className="w-full bg-transparent border-b border-line focus:border-brownDark outline-none py-2 text-brownDark font-serifTC font-medium"
              >
                {STATUS_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            <div>
              <label className="block text-xs font-medium text-brownSoft mb-2">商品照片（選填）</label>

              <button
                type="button"
                onClick={() => fileInputRef.current.click()}
                className="px-4 py-2 rounded-md bg-brownMid text-paper text-sm font-serifTC font-medium hover:bg-brownDark transition-colors"
              >
                選擇照片
              </button>
              <input
                ref={fileInputRef} type="file" accept="image/*" onChange={handleFileChange}
                className="hidden-file-input"
              />

              {imagePreview && (
                <div className="photo-frame mt-3">
                  <img src={imagePreview} alt="預覽" />
                </div>
              )}
            </div>

            <button
              type="submit"
              className="w-full mt-2 py-3 rounded-full bg-brownDark text-paper text-sm font-serifTC font-medium tracking-wide hover:bg-brownSoft transition-colors"
            >
              送出
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ---------- 商品詳情頁卡 / Product detail card（全新設計＋刪除功能） ---------- */
function DetailModal({ product, onClose, onDelete, onStatusChange }) {
  if (!product) return null;
  // 商品頁面卡邊框顏色：依目前選取的商品狀態即時變化
  // 已下單／未寄出 → #755B48　已寄出／面交 → #8E5835　到貨 → #A9835E
  const statusColor = getStatusColor(product.status);

  function handleDelete() {
    if (window.confirm("確定要刪除這個商品紀錄嗎？此操作無法復原。")) {
      onDelete(product.id);
    }
  }

  return (
    <div className="fixed inset-0 z-[60] bg-brownDark/40 backdrop-blur-[2px] flex items-center justify-center p-4 overflow-y-auto">
      <div
        className="paper-texture rounded-2xl shadow-xl w-full max-w-md my-8 overflow-hidden transition-colors duration-200"
        style={{ border: `3px solid ${statusColor}` }}
      >
        {/* 頂部照片區塊 */}
        <div className="relative z-[1] p-5 pb-0">
          <div className="photo-frame-detail">
            <img src={product.image || DEFAULT_PRODUCT_IMAGE} alt={product.name} />
          </div>

          <button
            onClick={onClose}
            aria-label="關閉"
            className="absolute top-8 right-8 w-8 h-8 rounded-full bg-cream/90 flex items-center justify-center text-brownSoft hover:text-brownDark shadow-sm"
          >
            <CloseIcon className="w-4 h-4" />
          </button>
        </div>

        {/* 內容區塊 */}
        <div className="relative z-[1] px-7 pt-6 pb-7">
          <p className="font-serifTC font-bold text-brownDark text-2xl leading-snug">{product.name}</p>

          <p className="font-serifTC font-bold text-brownSoft text-3xl mt-2">
            {product.price ? `NT$ ${Number(product.price).toLocaleString()}` : "未填寫金額"}
          </p>

          <div className="mt-5 flex flex-wrap items-center gap-2">
            <StatusPicker
              status={product.status}
              onChange={(s) => onStatusChange(product.id, s)}
              size="md"
            />
          </div>

          <div className="mt-6 pt-5 border-t border-line">
            <p className="text-xs text-brownSoft/70 font-serifTC font-medium">出貨商</p>
            <p className="text-brownDark font-serifTC font-medium text-base mt-1">{product.vendor || "未填寫出貨商"}</p>
          </div>

          <div className="mt-8 flex gap-3">
            <button
              onClick={onClose}
              className="flex-1 py-3 rounded-full border-2 border-brownDark text-brownDark text-sm font-serifTC font-medium hover:bg-brownDark hover:text-paper transition-colors"
            >
              返回清單
            </button>
            <button
              onClick={handleDelete}
              aria-label="刪除此商品"
              className="w-12 h-12 shrink-0 rounded-full flex items-center justify-center text-statusB border-2 border-statusB hover:bg-statusB hover:text-paper transition-colors"
            >
              <TrashIcon className="w-5 h-5" />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 主程式 / App root ---------- */
function App() {
  const [view, setView] = useState("home"); // 'home' | 'list' | 'shipping'
  const [products, setProducts] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  });
  const [showAddModal, setShowAddModal] = useState(false);
  // 改以 id 追蹤選取的商品，確保商品卡與清單上的狀態變更能即時同步
  const [selectedProductId, setSelectedProductId] = useState(null);
  const selectedProduct = products.find((p) => p.id === selectedProductId) || null;

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    } catch (e) {
      console.warn("localStorage 無法使用，本次資料僅暫存於記憶體中。");
    }
  }, [products]);

  function handleSaveProduct(product) {
    setProducts((prev) => [product, ...prev]);
    setShowAddModal(false);
    setView("list");
  }

  function handleDeleteProduct(id) {
    setProducts((prev) => prev.filter((p) => p.id !== id));
    setSelectedProductId(null);
  }

  // 商品清單按鈕（狀態切換）：讓使用者可在清單卡片或商品頁面卡中直接更改商品狀況
  function handleStatusChange(id, newStatus) {
    setProducts((prev) => prev.map((p) => (p.id === id ? { ...p, status: newStatus } : p)));
  }

  return (
    <div className="min-h-screen bg-cream">
      {view === "home" && <HomePage onEnter={() => setView("list")} />}
      {view === "list" && (
        <ListPage
          products={products}
          onSelect={(p) => setSelectedProductId(p.id)}
          onBackHome={() => setView("home")}
          onStatusChange={handleStatusChange}
        />
      )}
      {view === "shipping" && (
        <ShippingPage
          products={products}
          onSelect={(p) => setSelectedProductId(p.id)}
          onBack={() => setView("list")}
          onStatusChange={handleStatusChange}
        />
      )}

      {(view === "home" || view === "list") && (
        <TopCornerButton onClick={() => setView("shipping")} />
      )}

      {!showAddModal && view !== "shipping" && <FloatingAddButton onClick={() => setShowAddModal(true)} />}

      {showAddModal && (
        <AddProductModal onClose={() => setShowAddModal(false)} onSave={handleSaveProduct} />
      )}

      {selectedProduct && (
        <DetailModal
          product={selectedProduct}
          onClose={() => setSelectedProductId(null)}
          onDelete={handleDeleteProduct}
          onStatusChange={handleStatusChange}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
